<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Заполните анкету, чтобы забрать питомца из приюта «Лапа помощи».">
    <title>Приют «Лапа помощи» — Забрать питомца</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-paw logo__icon"></i>
                <span>Лапа помощи</span>
            </a>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Главная</a></li>
                    <li><a href="pets.html" class="nav__link">Питомцы</a></li>
                    <li><a href="help.html" class="nav__link">Помочь</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h2 class="section__title">Заявка на питомца</h2>
                <p class="section__subtitle">Заполните форму — мы свяжемся с вами</p>

                <div class="book-box">
                    <form id="bookForm">
                        <div class="form-group">
                            <label>Имя питомца *</label>
                            <input type="text" id="petName" placeholder="Например: Бим" required>
                        </div>

                        <div class="form-group">
                            <label>Ваше имя *</label>
                            <input type="text" id="fullName" placeholder="Иван Петров" required>
                        </div>

                        <div class="form-group">
                            <label>Телефон *</label>
                            <input type="tel" id="phone" placeholder="+7 (123) 456-78-90" required>
                        </div>

                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" placeholder="ivan@example.ru" required>
                        </div>

                        <div class="form-group">
                            <label>Адрес</label>
                            <input type="text" id="address" placeholder="Город, улица">
                        </div>

                        <div class="form-group">
                            <label>Есть ли другие животные?</label>
                            <div class="radio-group">
                                <label><input type="radio" name="otherPets" value="Нет"> Нет</label>
                                <label><input type="radio" name="otherPets" value="Кошка"> Кошка</label>
                                <label><input type="radio" name="otherPets" value="Собака"> Собака</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Опыт с кошками</label>
                            <textarea rows="3" id="experience" placeholder="Коротко расскажите..."></textarea>
                        </div>

                        <div class="form-group">
                            <label class="checkbox">
                                <input type="checkbox" id="agree" required>
                                <span>Я согласен с условиями приюта *</span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn--block">Отправить заявку</button>
                        <div id="message" class="form-message"></div>
                    </form>
                </div>

                <div class="back-link">
                    <a href="pets.html" class="btn btn--outline"><i class="fa-solid fa-arrow-left"></i> Назад к питомцам</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__copy">© 2026 Приют «Лапа помощи». Сделано с любовью к кошкам.</p>
            <ul class="footer__socials">
                <li><a href="https://vk.com/" target="_blank"><i class="fa-brands fa-vk"></i></a></li>
                <li><a href="https://t.me/" target="_blank"><i class="fa-brands fa-telegram"></i></a></li>
                <li><a href="https://instagram.com/" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
            </ul>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const petFromUrl = urlParams.get('pet');
        if (petFromUrl) {
            document.getElementById('petName').value = petFromUrl;
        }

        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const petName = document.getElementById('petName').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const agree = document.getElementById('agree').checked;
            const msgDiv = document.getElementById('message');

            msgDiv.className = 'form-message';
            msgDiv.textContent = '';

            if (!petName || !fullName || !phone || !email) {
                msgDiv.textContent = 'Заполните все поля со звёздочкой *';
                msgDiv.classList.add('error');
                return;
            }

            if (!agree) {
                msgDiv.textContent = 'Нужно согласиться с условиями приюта';
                msgDiv.classList.add('error');
                return;
            }

            msgDiv.textContent = `Спасибо, ${fullName}! Заявка на ${petName} принята. Мы скоро свяжемся с вами.`;
            msgDiv.classList.add('success');

            document.getElementById('bookForm').reset();
            if (petFromUrl) {
                document.getElementById('petName').value = petFromUrl;
            }
        });
    </script>
</body>
</html>
